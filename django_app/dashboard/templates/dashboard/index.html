<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UEI Cloud Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { slate: { 950: '#020617' } } } }
    }
  </script>
  <style>
    body { background: #020617; }
    .chart-container { position: relative; height: 180px; }
    select option { background: #1e293b; }
    /* Chatbot scrollbar */
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body class="text-slate-200 min-h-screen">

  <!-- ── DASHBOARD ─────────────────────────────────────────── -->
  <div class="max-w-7xl mx-auto p-6" id="app">

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl font-bold text-cyan-400 tracking-tight">UEI Cloud Dashboard</h1>
        <p id="last-updated" class="text-slate-500 text-xs mt-1"></p>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-slate-400 text-sm">Node</span>
        <select id="node-select"
          class="bg-slate-800 border border-slate-600 text-slate-100 text-sm rounded-lg px-3 py-2 focus:outline-none focus:border-cyan-500">
        </select>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="flex items-center justify-center py-20 text-slate-400 text-sm">
      Connecting to UEI Cloud…
    </div>

    <!-- Main content (hidden until loaded) -->
    <div id="content" class="hidden">

      <!-- Fault Banner -->
      <div id="fault-banner" class="hidden mb-6 bg-red-950 border border-red-600 rounded-xl p-4 flex items-center gap-3">
        <span class="text-red-400 font-bold text-lg">!</span>
        <div>
          <p id="fault-title" class="text-red-300 font-semibold"></p>
          <p id="fault-subtitle" class="text-red-400 text-sm"></p>
        </div>
      </div>

      <!-- Metric Cards -->
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-6" id="cards"></div>

      <!-- Time Range -->
      <div class="flex items-center gap-3 mb-4">
        <span class="text-slate-400 text-sm">Range</span>
        <button onclick="setRange('1h')" data-range="1h"
          class="range-btn px-3 py-1 rounded-lg text-sm font-medium bg-cyan-500 text-slate-950">1h</button>
        <button onclick="setRange('6h')" data-range="6h"
          class="range-btn px-3 py-1 rounded-lg text-sm font-medium bg-slate-800 text-slate-400 hover:bg-slate-700">6h</button>
        <button onclick="setRange('24h')" data-range="24h"
          class="range-btn px-3 py-1 rounded-lg text-sm font-medium bg-slate-800 text-slate-400 hover:bg-slate-700">24h</button>
      </div>

      <!-- Charts -->
      <div class="flex flex-col gap-4">
        <div class="bg-slate-900 rounded-xl p-4">
          <p class="text-slate-400 text-xs mb-3 font-medium uppercase tracking-wide">State of Charge</p>
          <div class="chart-container"><canvas id="chart-soc"></canvas></div>
        </div>
        <div class="bg-slate-900 rounded-xl p-4">
          <p class="text-slate-400 text-xs mb-3 font-medium uppercase tracking-wide">Pack Voltage</p>
          <div class="chart-container"><canvas id="chart-voltage"></canvas></div>
        </div>
        <div class="bg-slate-900 rounded-xl p-4">
          <p class="text-slate-400 text-xs mb-3 font-medium uppercase tracking-wide">Temperature</p>
          <div class="chart-container"><canvas id="chart-temp"></canvas></div>
        </div>
      </div>

      <!-- Footer -->
      <div class="mt-8 text-center text-slate-700 text-xs" id="footer"></div>
    </div>
  </div>

  <!-- ── CHATBOT WIDGET ─────────────────────────────────────── -->

  <!-- Bubble -->
  <button id="chat-toggle"
    onclick="toggleChat()"
    class="fixed bottom-6 right-6 z-50 w-14 h-14 rounded-full bg-cyan-500 hover:bg-cyan-400 shadow-lg flex items-center justify-center transition-colors"
    title="Ask AI">
    <svg id="icon-open" class="w-6 h-6 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
    </svg>
    <svg id="icon-close" class="hidden w-5 h-5 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>

  <!-- Panel -->
  <div id="chat-panel"
    class="hidden fixed bottom-24 right-6 z-50 w-96 h-[560px] bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl flex flex-col overflow-hidden">

    <!-- Chat Header -->
    <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800 flex-shrink-0">
      <div>
        <p class="text-sm font-semibold text-cyan-400">UEI Data Assistant</p>
        <p class="text-xs text-slate-500">Ask about your telemetry data</p>
      </div>
      <button onclick="newChat()"
        class="text-xs text-slate-500 hover:text-slate-300 border border-slate-700 hover:border-slate-500 rounded-lg px-2 py-1 transition-colors">
        New chat
      </button>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="flex-1 overflow-y-auto px-3 py-3 flex flex-col gap-3">
      <div id="suggestions" class="flex flex-col gap-2 pt-1">
        <p class="text-xs text-slate-500 text-center mb-1">Suggestions</p>
        <button onclick="sendChat(this.textContent)" class="suggestion-btn">How many nodes are reporting?</button>
        <button onclick="sendChat(this.textContent)" class="suggestion-btn">Show the latest SOC for all nodes</button>
        <button onclick="sendChat(this.textContent)" class="suggestion-btn">Are there any active faults?</button>
        <button onclick="sendChat(this.textContent)" class="suggestion-btn">What is the average pack voltage?</button>
        <button onclick="sendChat(this.textContent)" class="suggestion-btn">Show temp trends in the last hour</button>
      </div>
    </div>

    <!-- Chat Input -->
    <form onsubmit="return submitChat(event)"
      class="flex gap-2 px-3 py-3 border-t border-slate-800 flex-shrink-0">
      <input id="chat-input" type="text" placeholder="Ask anything…" autocomplete="off"
        class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500 transition-colors" />
      <button type="submit" id="chat-btn"
        class="bg-cyan-600 hover:bg-cyan-700 disabled:bg-slate-700 disabled:cursor-not-allowed text-white rounded-xl px-3 py-2 text-xs font-semibold transition-colors">
        Send
      </button>
    </form>
  </div>

  <style>
    .suggestion-btn {
      text-align: left;
      font-size: 0.75rem;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      border-radius: 0.75rem;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .suggestion-btn:hover { border-color: #0e7490; color: #22d3ee; }
    .metric-card { background: #0f172a; border-radius: 0.75rem; padding: 1rem; }
    .metric-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .metric-value { font-size: 1.4rem; font-weight: 700; color: #f1f5f9; }
    .metric-unit  { font-size: 0.75rem; color: #64748b; margin-left: 2px; }
    .bar-bg { background: #1e293b; border-radius: 9999px; height: 4px; margin-top: 6px; }
    .bar-fg { height: 4px; border-radius: 9999px; transition: width 0.3s; }
  </style>

  <script>
    // ── Dashboard state ────────────────────────────────────────
    let nodes      = [];
    let selectedId = '';
    let timeRange  = '1h';
    let charts     = {};
    let initialized = false;

    const chartDefaults = {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: '#1e293b',
        titleColor: '#94a3b8',
        bodyColor: '#e2e8f0',
        borderColor: '#334155',
        borderWidth: 1,
      }},
      scales: {
        x: { ticks: { color: '#475569', maxTicksLimit: 6, font: { size: 10 } }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#475569', font: { size: 10 } }, grid: { color: '#1e293b' } },
      },
    };

    function makeChart(id, color) {
      const ctx = document.getElementById(id).getContext('2d');
      return new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [] },
        options: { ...chartDefaults },
      });
    }

    function initCharts() {
      charts.soc     = makeChart('chart-soc',     '#06b6d4');
      charts.voltage = makeChart('chart-voltage',  '#a78bfa');
      charts.temp    = makeChart('chart-temp',     '#f97316');
    }

    function updateChart(chart, data, lines) {
      if (!data || !data.length) return;
      const labels = data.map(d => new Date(d.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
      chart.data.labels = labels;
      chart.data.datasets = lines.map(l => ({
        label: l.label,
        data: data.map(d => d[l.key]),
        borderColor: l.color,
        backgroundColor: l.color + '18',
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        tension: 0.3,
      }));
      chart.update('none');
    }

    async function fetchLatest() {
      try {
        const resp = await fetch('/api/latest');
        const data = await resp.json();
        nodes = Array.isArray(data) ? data : [data];
        if (!initialized && nodes.length) {
          selectedId = nodes[0].node_id;
          initialized = true;
          populateSelect();
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('content').classList.remove('hidden');
          initCharts();
          fetchCharts();
        }
        renderCards();
        document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
      } catch {}
    }

    function populateSelect() {
      const sel = document.getElementById('node-select');
      sel.innerHTML = nodes.map(n => `<option value="${n.node_id}">${n.node_id}</option>`).join('');
      sel.value = selectedId;
      sel.onchange = () => { selectedId = sel.value; renderCards(); fetchCharts(); };
    }

    function fmt(v, d = 1) { return v !== undefined && v !== null ? Number(v).toFixed(d) : '—'; }

    function card(label, value, unit = '', bar = null, highlight = 'normal') {
      const colors = { normal: '#f1f5f9', warning: '#fbbf24', danger: '#f87171', success: '#34d399' };
      const color = colors[highlight] || colors.normal;
      let barHtml = '';
      if (bar !== null && bar !== undefined) {
        const pct = Math.min(100, Math.max(0, bar));
        const barColor = highlight === 'danger' ? '#f87171' : highlight === 'warning' ? '#fbbf24' : '#06b6d4';
        barHtml = `<div class="bar-bg"><div class="bar-fg" style="width:${pct}%;background:${barColor}"></div></div>`;
      }
      return `<div class="metric-card">
        <div class="metric-label">${label}</div>
        <div style="color:${color}">
          <span class="metric-value">${value}</span><span class="metric-unit">${unit}</span>
        </div>
        ${barHtml}
      </div>`;
    }

    function renderCards() {
      const row = nodes.find(n => n.node_id === selectedId);
      if (!row) return;

      const fault   = row.fault_active;
      const soc     = row.soc;
      const socHL   = soc === undefined ? 'normal' : soc >= 30 ? 'normal' : soc >= 15 ? 'warning' : 'danger';
      const tempHL  = row.temp_high > 45 ? 'danger' : 'normal';

      document.getElementById('cards').innerHTML =
        card('State of Charge', fmt(soc), '%', soc, socHL) +
        card('Pack Voltage',    fmt(row.pack_voltage), 'V') +
        card('Pack Current',    fmt(row.pack_current), 'A') +
        card('Temp High',       fmt(row.temp_high),    '°C', null, tempHL) +
        card('Temp Low',        fmt(row.temp_low),     '°C') +
        card('Highest Cell',    fmt(row.highest_cell_v, 3), 'V') +
        card('Lowest Cell',     fmt(row.lowest_cell_v, 3),  'V') +
        card('CCL',             fmt(row.ccl), 'A') +
        card('DCL',             fmt(row.dcl), 'A') +
        card('Fault Status',    fault ? 'ACTIVE' : 'Clear', '', null, fault ? 'danger' : 'success');

      const banner = document.getElementById('fault-banner');
      if (fault) {
        document.getElementById('fault-title').textContent    = `Fault Active — ${row.bms_id}`;
        document.getElementById('fault-subtitle').textContent = `Last cleared ${fmt(row.faults_cleared_min)} min ago`;
        banner.classList.remove('hidden');
      } else {
        banner.classList.add('hidden');
      }

      document.getElementById('footer').textContent = `UEI Cloud Platform · ${row.bms_id ?? '—'}`;
    }

    async function fetchCharts() {
      if (!selectedId) return;
      const base = `/api/metrics?node_id=${encodeURIComponent(selectedId)}&range=${timeRange}`;
      try {
        const [soc, volt, temp] = await Promise.all([
          fetch(`${base}&metric=soc`).then(r => r.json()),
          fetch(`${base}&metric=pack_voltage`).then(r => r.json()),
          fetch(`${base}&metric=temperature`).then(r => r.json()),
        ]);
        updateChart(charts.soc,     soc,  [{ key: 'value', label: 'SOC',     color: '#06b6d4' }]);
        updateChart(charts.voltage, volt, [{ key: 'value', label: 'Voltage', color: '#a78bfa' }]);
        updateChart(charts.temp,    temp, [
          { key: 'high', label: 'Temp High', color: '#f97316' },
          { key: 'low',  label: 'Temp Low',  color: '#60a5fa' },
        ]);
      } catch {}
    }

    function setRange(r) {
      timeRange = r;
      document.querySelectorAll('.range-btn').forEach(b => {
        const active = b.dataset.range === r;
        b.className = `range-btn px-3 py-1 rounded-lg text-sm font-medium transition-colors ${
          active ? 'bg-cyan-500 text-slate-950' : 'bg-slate-800 text-slate-400 hover:bg-slate-700'
        }`;
      });
      fetchCharts();
    }

    fetchLatest();
    setInterval(fetchLatest, 5000);
    setInterval(fetchCharts, 30000);

    // ── Chatbot ────────────────────────────────────────────────
    let chatOpen    = false;
    let chatBusy    = false;
    let chatHistory = [];

    function toggleChat() {
      chatOpen = !chatOpen;
      document.getElementById('chat-panel').classList.toggle('hidden', !chatOpen);
      document.getElementById('icon-open').classList.toggle('hidden', chatOpen);
      document.getElementById('icon-close').classList.toggle('hidden', !chatOpen);
      if (chatOpen) document.getElementById('chat-input').focus();
    }

    function newChat() {
      chatHistory = [];
      document.getElementById('chat-messages').innerHTML = `
        <div id="suggestions" class="flex flex-col gap-2 pt-1">
          <p class="text-xs text-slate-500 text-center mb-1">Suggestions</p>
          <button onclick="sendChat(this.textContent)" class="suggestion-btn">How many nodes are reporting?</button>
          <button onclick="sendChat(this.textContent)" class="suggestion-btn">Show the latest SOC for all nodes</button>
          <button onclick="sendChat(this.textContent)" class="suggestion-btn">Are there any active faults?</button>
          <button onclick="sendChat(this.textContent)" class="suggestion-btn">What is the average pack voltage?</button>
          <button onclick="sendChat(this.textContent)" class="suggestion-btn">Show temp trends in the last hour</button>
        </div>`;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderMd(text) {
      return text
        .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre style="background:#0f172a;padding:8px;border-radius:6px;font-size:0.75rem;overflow-x:auto;margin:4px 0">$1</pre>')
        .replace(/`([^`]+)`/g, '<code style="background:#0f172a;padding:1px 5px;border-radius:3px;font-size:0.8em">$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/^\s*[-*]\s+(.+)$/gm, '<li style="margin-left:12px">$1</li>')
        .replace(/\n/g, '<br>');
    }

    function appendMsg(role, html, id) {
      const msgs = document.getElementById('chat-messages');
      const div  = document.createElement('div');
      div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
      div.innerHTML = `<div id="${id || ''}" class="max-w-[85%] rounded-2xl px-3 py-2 text-xs leading-relaxed ${
        role === 'user'
          ? 'bg-cyan-700 text-cyan-50 rounded-br-sm'
          : 'bg-slate-800 text-slate-200 rounded-bl-sm'
      }">${html}</div>`;
      msgs.appendChild(div);
      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return div.querySelector(`#${id}`) || div.firstChild;
    }

    async function sendChat(text) {
      if (!text.trim() || chatBusy) return;
      document.getElementById('chat-input').value = '';
      chatBusy = true;
      document.getElementById('chat-btn').disabled = true;

      const sugg = document.getElementById('suggestions');
      if (sugg) sugg.remove();

      appendMsg('user', escHtml(text));

      const msgId = 'msg-' + Date.now();
      const bubble = appendMsg('assistant',
        '<div style="display:flex;align-items:center;gap:6px;color:#64748b;font-style:italic">' +
        '<span style="width:6px;height:6px;border-radius:50%;background:#22d3ee;display:inline-block;animation:pulse 1s infinite"></span>' +
        'Thinking…</div>',
        msgId
      );

      let accumulated = '';
      let hasContent  = false;
      const queries   = [];

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: chatHistory }),
        });

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let   buffer  = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            if (event.type === 'text') {
              if (!hasContent) { bubble.innerHTML = ''; hasContent = true; }
              accumulated += event.text;
              let tb = bubble.querySelector('.text-body');
              if (!tb) { tb = document.createElement('div'); tb.className = 'text-body'; bubble.appendChild(tb); }
              tb.innerHTML = renderMd(accumulated);
              bubble.scrollIntoView({ behavior: 'smooth', block: 'end' });

            } else if (event.type === 'query') {
              queries.push(event);
              if (!hasContent) { bubble.innerHTML = ''; hasContent = true; }
              const badge = document.createElement('div');
              badge.style.cssText = 'display:flex;align-items:flex-start;gap:6px;background:#0f172a;border:1px solid #1e3a5f;border-radius:8px;padding:5px 8px;font-size:0.7rem;font-family:monospace;color:#7dd3fc;margin-bottom:4px;word-break:break-all';
              badge.innerHTML = `<span style="color:#22d3ee;flex-shrink:0">▶</span><span>${escHtml(event.sql.trim())}</span><span style="color:#475569;margin-left:auto;padding-left:6px;flex-shrink:0">${event.rows}r</span>`;
              bubble.insertBefore(badge, bubble.querySelector('.text-body') || null);

            } else if (event.type === 'done') {
              const t = event.assistantText || accumulated;
              chatHistory = [...chatHistory,
                { role: 'user',      content: text },
                { role: 'assistant', content: t    },
              ];
            } else if (event.type === 'error') {
              bubble.innerHTML = `<span style="color:#f87171">Error: ${escHtml(event.text)}</span>`;
            }
          }
        }
      } catch (err) {
        bubble.innerHTML = `<span style="color:#f87171">Connection error: ${escHtml(err.message)}</span>`;
      }

      chatBusy = false;
      document.getElementById('chat-btn').disabled = false;
      document.getElementById('chat-input').focus();
    }

    function submitChat(e) {
      e.preventDefault();
      sendChat(document.getElementById('chat-input').value.trim());
      return false;
    }
  </script>
</body>
</html>
